<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loyalty Mock Client</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f4f6f9;
      --surface:      #ffffff;
      --border:       #e2e8f0;
      --text:         #1a202c;
      --muted:        #718096;
      --radius:       10px;
      --panel-w:      360px;

      --enrolled:     #22c55e;
      --notEnrolled:  #f59e0b;
      --unenrolled:   #94a3b8;
      --declined:     #ef4444;

      --action-bg:    #ede9fe;
      --action-fg:    #6d28d9;

      --primary:      #3b82f6;
      --primary-dark: #2563eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header sticky ── */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }

    #header h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #header-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: var(--muted);
    }
    .status-badge::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.5);
    }
    .status-badge.enrolled    { background: var(--enrolled); }
    .status-badge.notEnrolled { background: var(--notEnrolled); }
    .status-badge.unenrolled  { background: var(--unenrolled); }
    .status-badge.declined    { background: var(--declined); }

    .action-badge {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: var(--action-bg);
      color: var(--action-fg);
    }

    .header-field { font-size: 12px; color: var(--muted); }
    .header-field span { font-weight: 600; color: var(--text); }
    #header-error { font-size: 13px; color: var(--declined); font-weight: 600; }

    /* ── Header buttons ── */
    .hdr-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: background .15s;
    }
    .hdr-btn:hover { background: var(--bg); }
    .hdr-btn.loading svg { animation: spin .8s linear infinite; }
    .hdr-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .hdr-btn.active:hover { background: var(--primary-dark); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main content ── */
    main {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 24px;
      display: grid;
      gap: 20px;
      transition: margin-right .25s;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-title {
      padding: 14px 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    }
    .field {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .field.col-2 { grid-column: span 2; }
    .field-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .field-value { font-size: 15px; font-weight: 500; }
    .field-value.empty { color: var(--muted); font-style: italic; font-size: 13px; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 18px;
      width: 120px;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }

    /* ── Config panel ── */
    #panel-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.2);
      z-index: 199;
    }
    #panel-backdrop.visible { display: block; }

    #config-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: var(--panel-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 20px rgba(0,0,0,.1);
      z-index: 200;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .25s ease;
    }
    #config-panel.open { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      flex-shrink: 0;
    }
    .panel-header h2 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }
    .panel-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 16px;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .panel-close:hover { background: var(--bg); }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Server info pills */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); }
    .info-val { font-weight: 600; font-family: monospace; font-size: 12px; }

    /* Form fields */
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }
    .form-control {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }
    .form-control:focus { border-color: var(--primary); }

    /* Paths list */
    .path-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .path-row:last-child { border-bottom: none; }
    .path-key { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
    .path-val { font-family: monospace; color: var(--text); word-break: break-all; }

    /* Panel footer */
    .panel-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn-apply {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-apply:hover { background: var(--primary-dark); }
    .btn-apply:disabled { opacity: .5; cursor: not-allowed; }

    .form-control.dirty {
      border-color: var(--primary);
      background: #eff6ff;
    }

    #pending-notice {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      padding: 6px 10px;
      border-radius: 7px;
      min-height: 0;
      display: none;
    }
    #pending-notice.visible {
      display: block;
      background: #fef9c3;
      color: #92400e;
    }

    #apply-feedback {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    #apply-feedback.ok  { color: var(--enrolled); }
    #apply-feedback.err { color: var(--declined); }
  </style>
</head>
<body>

  <!-- ── Sticky header ── -->
  <header id="header">
    <h1>Loyalty Mock</h1>
    <div id="header-summary">
      <div class="skeleton" style="width:100px"></div>
      <div class="skeleton" style="width:160px"></div>
    </div>

    <button id="btn-refresh" class="hdr-btn" onclick="refreshStatus()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
      </svg>
      Actualizar
    </button>

    <button id="btn-config" class="hdr-btn" onclick="togglePanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Config
    </button>
  </header>

  <!-- ── Main ── -->
  <main>
    <div class="card">
      <div class="card-title">Estado de Lealtad</div>
      <div class="fields" id="loyalty-fields"></div>
    </div>
    <div class="card">
      <div class="card-title">Datos del Usuario</div>
      <div class="fields" id="user-fields"></div>
    </div>
  </main>

  <!-- ── Backdrop ── -->
  <div id="panel-backdrop" onclick="togglePanel()"></div>

  <!-- ── Config panel ── -->
  <aside id="config-panel">
    <div class="panel-header">
      <h2>Configuración</h2>
      <button class="panel-close" onclick="togglePanel()">✕</button>
    </div>

    <div class="panel-body">
      <!-- Servidor -->
      <section>
        <div class="panel-section-title">Servidor</div>
        <div id="panel-server"></div>
      </section>

      <!-- Variables editables -->
      <section>
        <div class="panel-section-title">Variables</div>
        <div id="panel-form" style="display:flex;flex-direction:column;gap:14px;"></div>
      </section>

      <!-- Paths activos -->
      <section>
        <div class="panel-section-title">Paths activos</div>
        <div id="panel-paths"></div>
      </section>
    </div>

    <div class="panel-footer">
      <div id="pending-notice"></div>
      <button class="btn-apply" id="btn-apply" onclick="applyConfig()">Aplicar cambios</button>
      <div id="apply-feedback"></div>
    </div>
  </aside>

  <script src="index.js"></script>
</body>
</html>
